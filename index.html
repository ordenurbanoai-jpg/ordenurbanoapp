                        {tab === 'info' && (<div className="bg-background rounded-xl shadow-sm border border-secondary p-6 grid grid-cols-2 gap-8"><div><h4 className="text-xs font-bold text-foreground/40 uppercase mb-3 flex items-center gap-2"><User className="w-4 h-4"/> Datos Contacto</h4><ul className="space-y-3 text-sm"><li><span className="text-foreground/60 block text-[10px] uppercase">Dirección</span> <b>{viewC.address}</b>, {viewC.poblacion}</li><li><span className="text-foreground/60 block text-[10px] uppercase">Terreno / Vivienda</span> <b>{viewC.tieneTerreno} | {viewC.tipoVivienda} ({viewC.m2} m²)</b></li></ul></div><div><h4 className="text-xs font-bold text-foreground/40 uppercase mb-3 flex items-center gap-2"><Activity className="w-4 h-4"/> Estado CRM</h4><ul className="space-y-3 text-sm"><li><span className="text-foreground/60 block text-[10px] uppercase">Motivo Consulta</span> <b>{viewC.motivo || '-'}</b></li><li><span className="text-foreground/60 block text-[10px] uppercase">Presupuesto Estimado</span> <b className="text-primary">{viewC.presupuestoEst ? formatCurrency(viewC.presupuestoEst) : '-'}</b></li><li><span className="text-foreground/60 block text-[10px] uppercase">Notas Internas</span> <div className="bg-secondary p-3 rounded mt-1 text-xs">{viewC.notas || 'Sin notas.'}</div></li></ul></div></div>)}
                        {tab === 'proyectos' && (<div className="bg-background rounded-xl shadow-sm border border-secondary p-6"><div className="grid grid-cols-2 gap-4">{cProj.map(p=>(<div key={p.id} className="border border-muted p-4 rounded-xl"><div className="flex justify-between"><h5 className="font-bold text-sm">{p.name}</h5><span className="text-[10px] font-bold bg-accent/10 text-accent px-2 py-0.5 rounded">{p.status}</span></div><p className="text-sm font-black mt-2">{formatCurrency(p.budget)}</p></div>))}</div></div>)}
                        {tab === 'crm' && (<div className="bg-background rounded-xl shadow-sm border border-secondary p-6"><div className="space-y-4 border-l-2 border-secondary ml-2 pl-6">{cInts.map(i=>(<div key={i.id} className="relative"><div className="absolute -left-[35px] top-1 bg-background border-2 border-secondary p-1 rounded-full"><PhoneCall className="w-3 h-3 text-accent"/></div><div className="border border-muted p-4 rounded-xl"><div className="flex justify-between"><h5 className="font-bold text-sm">{i.subject}</h5><span className="text-[10px] text-foreground/50 font-bold">{i.date.split('T')[0]}</span></div><p className="text-xs mt-2 mb-3">{i.notes}</p><div className="flex gap-2"><a href={getGoogleCalUrl(i.subject, i.notes, i.date)} target="_blank" className="bg-[#4285F4]/10 text-[#4285F4] px-3 py-1.5 rounded-lg text-[10px] font-bold">Agendar en Google</a><button onClick={()=>downloadICS(i.subject, i.notes, i.date)} className="bg-foreground text-background px-3 py-1.5 rounded-lg text-[10px] font-bold">Guardar (.ics)</button></div></div></div>))}</div></div>)}
                        {tab === 'docs' && (<div className="bg-background rounded-xl shadow-sm border border-secondary overflow-hidden"><table className="w-full text-left text-sm"><thead className="bg-secondary/50 border-b border-muted text-xs uppercase text-foreground/60"><tr><th className="p-4">Ref</th><th className="p-4">Fecha</th><th className="p-4 text-right">Importe</th></tr></thead><tbody>{cBudgets.map(f=>(<tr key={f.id} className="border-b border-muted/50"><td className="p-4 font-bold">{f.ref}</td><td className="p-4">{f.date}</td><td className="p-4 text-right font-black">{formatCurrency(f.amount)}</td></tr>))}</tbody></table></div>)}
                    </div></div>
                </div>
            );
        }

        return (
            <div className="p-8 max-w-7xl mx-auto h-full flex flex-col animate-in fade-in overflow-y-auto">
                <header className="mb-6 flex justify-between items-end"><div><h1 className="text-3xl font-black font-display tracking-tightest">Gestor de Clientes</h1><p className="text-foreground/60 font-medium mt-1 text-sm">Directorio CRM ({clientes.length} contactos)</p></div><button onClick={()=>{setIsAdding(!isAdding); if(!isAdding) setForm(emptyForm);}} className="bg-primary text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2">{isAdding ? <X className="w-4 h-4"/> : <Plus className="w-4 h-4"/>} Nuevo Cliente</button></header>
                {isAdding && (
                    <div className="bg-background p-6 rounded-2xl shadow-xl border border-accent mb-6 animate-in slide-in-from-top-4">
                        <form onSubmit={handleSave} className="grid grid-cols-4 gap-4"><div className="col-span-2"><label className="block text-[10px] font-bold uppercase mb-1">Nombre *</label><input required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full p-2 border rounded"/></div><div><label className="block text-[10px] font-bold uppercase mb-1">Teléfono</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} className="w-full p-2 border rounded"/></div><div><label className="block text-[10px] font-bold uppercase mb-1">Población</label><input value={form.poblacion} onChange={e=>setForm({...form,poblacion:e.target.value})} className="w-full p-2 border rounded"/></div><div className="col-span-2"><label className="block text-[10px] font-bold uppercase mb-1">Motivo / Tipo Vivienda</label><input value={form.motivo} onChange={e=>setForm({...form,motivo:e.target.value})} className="w-full p-2 border rounded"/></div><div><label className="block text-[10px] font-bold uppercase mb-1">Presupuesto</label><input type="number" value={form.presupuestoEst} onChange={e=>setForm({...form,presupuestoEst:e.target.value})} className="w-full p-2 border rounded"/></div><div><label className="block text-[10px] font-bold uppercase mb-1">Estado</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} className="w-full p-2 border rounded"><option>Activo</option><option>Lead</option><option>Inactivo</option></select></div><div className="col-span-4 flex justify-end gap-3 mt-4"><button type="button" onClick={()=>setIsAdding(false)} className="px-6 py-2 font-bold text-foreground/60">Cancelar</button><button type="submit" className="bg-primary text-white px-8 py-2 rounded-lg font-bold shadow-md">Guardar</button></div></form>
                    </div>
                )}
                <div className="bg-background rounded-xl shadow-sm border border-secondary flex-1 flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-secondary bg-secondary/50"><div className="relative"><Search className="absolute left-3 top-2.5 w-4 h-4 text-foreground/40" /><input type="text" placeholder="Buscar cliente..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-9 pr-4 py-2 border rounded-lg text-sm" /></div></div>
                    <div className="flex-1 overflow-y-auto custom-scrollbar p-4"><div className="grid grid-cols-3 gap-4">
                        {filtered.map(c => (
                            <div key={c.id} onClick={()=>setViewC(c)} className="border border-muted rounded-xl p-5 hover:border-primary/50 hover:shadow-md transition-all bg-background relative cursor-pointer group">
                                <div className={`absolute top-0 left-0 w-1 h-full ${c.status === 'Activo' ? 'bg-success' : c.status === 'Lead' ? 'bg-warning' : 'bg-muted'}`}></div>
                                <div className="flex justify-between items-start mb-3"><span className="text-[10px] font-bold uppercase px-2 py-1 rounded-full bg-secondary">{c.status}</span><button onClick={(e)=>{e.stopPropagation(); if(window.confirm('¿Eliminar?')) deleteItem('clientes', c.id);}} className="text-foreground/40 hover:text-destructive opacity-0 group-hover:opacity-100 transition"><Trash2 className="w-4 h-4"/></button></div>
                                <h3 className="font-bold text-lg truncate font-display tracking-tightest mb-1">{c.name}</h3>
                                <p className="text-xs text-foreground/60 mb-2">{c.phone || c.email || 'Sin contacto'}</p>
                                <p className="text-xs font-bold text-accent truncate">{c.motivo}</p>
                            </div>
                        ))}
                    </div></div>
                </div>
            </div>
        );
    };

    // 3. AGENDADOR INTELIGENTE
    const Interacciones = ({ interacciones, clientes, saveItem, deleteItem }) => {
        const [isAdding, setIsAdding] = useState(false); 
        const [newInt, setNewInt] = useState({ entityName: '', type: 'Reunión', modalidad: 'Presencial', date: new Date().toISOString().slice(0, 16), subject: '', notes: '', author: 'Ainoa Fdez.', isAlert: false, duracion: 60 });
        const conflictos = useMemo(() => {
            if(!newInt.date) return []; const targetTime = new Date(newInt.date).getTime();
            return interacciones.filter(i => Math.abs(targetTime - new Date(i.date).getTime()) < (i.duracion||60)*60000);
        }, [newInt.date, interacciones]);

        const handleAdd = (e) => { e.preventDefault(); saveItem('interacciones', newInt); setIsAdding(false); };

        return (
            <div className="p-8 max-w-5xl mx-auto h-full flex flex-col overflow-y-auto animate-in fade-in">
                <header className="mb-6 flex justify-between items-end"><div><h1 className="text-3xl font-black font-display tracking-tightest">Agendador y Calendario</h1></div><button onClick={() => setIsAdding(!isAdding)} className="bg-primary text-white px-5 py-2.5 rounded-lg font-bold shadow-md flex items-center gap-2">{isAdding ? <X className="w-4 h-4"/> : <Plus className="w-4 h-4"/>} Nueva Cita</button></header>
                {isAdding && (
                    <div className="bg-background p-6 rounded-xl border border-accent mb-6 shadow-sm"><form onSubmit={handleAdd} className="grid grid-cols-3 gap-4"><div className="col-span-1"><label className="block text-[10px] font-bold uppercase mb-1">Cliente</label><select required value={newInt.entityName} onChange={e => setNewInt({...newInt, entityName: e.target.value})} className="w-full p-2 border rounded"><option value="">Seleccionar...</option>{clientes.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div><div><label className="block text-[10px] font-bold uppercase mb-1">Tipo</label><select value={newInt.type} onChange={e => setNewInt({...newInt, type: e.target.value})} className="w-full p-2 border rounded"><option>Reunión</option><option>Llamada</option><option>Visita Obra</option></select></div><div><label className="block text-[10px] font-bold uppercase mb-1">Fecha</label><input type="datetime-local" value={newInt.date} onChange={e => setNewInt({...newInt, date: e.target.value})} className="w-full p-2 border rounded" /></div><div className="col-span-3"><label className="block text-[10px] font-bold uppercase mb-1">Asunto</label><input required type="text" value={newInt.subject} onChange={e => setNewInt({...newInt, subject: e.target.value})} className="w-full p-2 border rounded" /></div>
                        {conflictos.length > 0 && (<div className="col-span-3 bg-warning/10 border border-warning p-4 rounded-lg text-sm"><p className="font-bold text-warning-foreground flex items-center gap-1"><AlertTriangle className="w-5 h-5"/> ¡Conflicto Detectado!</p><ul className="ml-5 list-disc text-foreground/80 text-xs my-2 font-bold">{conflictos.map(c => <li key={c.id}>{c.subject} a las {c.date.split('T')[1]}</li>)}</ul></div>)}
                        <div className="col-span-3"><label className="block text-[10px] font-bold uppercase mb-1">Notas</label><textarea rows="2" value={newInt.notes} onChange={e => setNewInt({...newInt, notes: e.target.value})} className="w-full p-2 border rounded"></textarea></div><div className="col-span-3 flex justify-end mt-2"><button type="submit" className="bg-primary text-white px-6 py-2.5 rounded-lg font-bold shadow-md">Agendar Evento</button></div></form></div>
                )}
                <div className="bg-background rounded-xl border border-secondary flex-1 p-6 overflow-y-auto custom-scrollbar"><div className="relative border-l-2 border-secondary ml-4 space-y-6 pb-10">
                    {interacciones.sort((a,b) => new Date(b.date) - new Date(a.date)).map(i => (
                        <div key={i.id} className="relative pl-8"><div className="absolute -left-[17px] top-1 bg-background border-2 border-secondary p-1.5 rounded-full shadow-sm"><Calendar className="w-4 h-4 text-accent"/></div><div className={`bg-secondary/30 border ${i.isAlert ? 'border-warning/50' : 'border-muted'} rounded-xl p-5 transition`}>
                            <div className="flex justify-between items-start mb-2"><div><span className="font-bold font-display text-base block">{i.entityName}</span></div><span className="text-xs text-foreground/60 bg-background px-2 py-1 rounded-md font-bold shadow-sm border border-muted">{new Date(i.date).toLocaleString('es-ES', {dateStyle:'full', timeStyle:'short'})}</span></div>
                            <h4 className="font-bold text-sm mb-1 mt-2">{i.subject}</h4><p className="text-sm text-foreground/70 mb-4">{i.notes}</p>
                            <div className="flex items-center gap-2 border-t border-muted/50 pt-3">
                                <a href={getGoogleCalUrl(i.subject, i.notes, i.date, i.duracion)} target="_blank" rel="noreferrer" className="bg-[#4285F4]/10 text-[#4285F4] px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2"><CalendarDays className="w-4 h-4"/> Google Cal</a>
                                <button onClick={() => downloadICS(i.subject, i.notes, i.date, i.duracion)} className="bg-foreground text-background px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-2"><CalendarCheck className="w-4 h-4"/> Apple (.ics)</button>
                                <button onClick={() => {if(window.confirm('¿Eliminar?')) deleteItem('interacciones', i.id)}} className="text-xs text-destructive font-bold ml-auto p-2">Borrar</button>
                            </div>
                        </div></div>
                    ))}
                </div></div>
            </div>
        );
    };

    // 4. KANBAN DE PROYECTOS
    const GestorProyectos = ({ proyectos, clientes, saveItem, deleteItem }) => {
        const [isAdding, setIsAdding] = useState(false); 
        const [newP, setNewP] = useState({ name: '', client: '', status: 'Estudio', budget: '', date: new Date().toISOString().split('T')[0], prioridad: 'Media' });
        const handleSave = (e) => { e.preventDefault(); if(!newP.name) return; saveItem('proyectos', {...newP, budget: Number(newP.budget)||0}); setIsAdding(false); };
        const cols = ['Estudio', 'En Diseño', 'En Obra', 'Finalizado'];
        return (
            <div className="p-8 max-w-7xl mx-auto h-full flex flex-col animate-in fade-in overflow-y-auto"><header className="mb-6 flex justify-between items-end"><div><h1 className="text-3xl font-black font-display tracking-tightest">Proyectos Kanban</h1></div><button onClick={() => setIsAdding(!isAdding)} className="bg-primary text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm">{isAdding ? <X className="w-4 h-4"/> : <Plus className="w-4 h-4"/>} Nuevo</button></header>
                {isAdding && (<div className="bg-background p-6 rounded-xl shadow-sm border border-accent mb-6"><form onSubmit={handleSave} className="grid grid-cols-4 gap-4"><div className="col-span-2"><label className="block text-[10px] font-bold uppercase mb-1">Nombre</label><input required value={newP.name} onChange={e=>setNewP({...newP,name:e.target.value})} className="w-full p-2 border rounded"/></div><div className="col-span-2"><label className="block text-[10px] font-bold uppercase mb-1">Cliente</label><select value={newP.client} onChange={e=>setNewP({...newP,client:e.target.value})} className="w-full p-2 border rounded"><option value="">Sel...</option>{clientes.map(c=><option key={c.id}>{c.name}</option>)}</select></div><div><label className="block text-[10px] font-bold uppercase mb-1">Estado</label><select value={newP.status} onChange={e=>setNewP({...newP,status:e.target.value})} className="w-full p-2 border rounded">{cols.map(c=><option key={c}>{c}</option>)}</select></div><div><label className="block text-[10px] font-bold uppercase mb-1">Presupuesto</label><input type="number" value={newP.budget} onChange={e=>setNewP({...newP,budget:e.target.value})} className="w-full p-2 border rounded"/></div><div className="col-span-4 flex justify-end"><button type="submit" className="bg-primary text-white px-6 py-2 rounded font-bold">Guardar</button></div></form></div>)}
                <div className="grid grid-cols-4 gap-4 flex-1 items-start">{cols.map(c => (<div key={c} className="bg-secondary/40 border border-secondary rounded-2xl p-4 flex flex-col max-h-[80vh] overflow-hidden"><h3 className="font-black font-display text-sm uppercase tracking-widest mb-4 flex justify-between">{c} <span className="text-foreground/40 bg-background px-2 py-0.5 rounded-full text-[10px]">{proyectos.filter(p=>p.status===c).length}</span></h3><div className="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1">{proyectos.filter(p=>p.status===c).map(p=>(<div key={p.id} className="bg-background p-4 rounded-xl shadow-sm border border-muted hover:border-accent cursor-pointer group relative"><button onClick={()=>{if(window.confirm('Eliminar?')) deleteItem('proyectos', p.id)}} className="absolute top-2 right-2 text-foreground/30 hover:text-destructive opacity-0 group-hover:opacity-100 transition p-1"><Trash2 className="w-3 h-3"/></button><h4 className="font-bold text-sm leading-tight mb-1">{p.name}</h4><p className="text-xs text-foreground/60 mb-3 truncate">{p.client}</p><div className="flex justify-between items-end border-t border-muted/50 pt-2 mt-2"><span className="text-[10px] font-medium flex items-center gap-1"><Calendar className="w-3 h-3"/> {p.date}</span><span className="font-black text-xs text-primary">{formatCurrency(p.budget)}</span></div></div>))}</div></div>))}</div>
            </div>
        );
    };

    // 5. CALCULADORA P.E.M. Y GENERADOR DE PDF
    const CalculadoraBunker = ({ saveItem }) => {
        const defaultChapters = [{ id: 'c1', name: '01. HONORARIOS Y PROYECTO', items: [{ id: 1, name: 'Redacción de Proyecto', cost: 18500, isIncluded: true }] }, { id: 'c2', name: '02. CIMENTACIÓN', items: [{ id: 2, name: 'Movimiento de Tierras y Muros', cost: 23588, isIncluded: true }] }];
        const [chapters, setChapters] = useState(() => JSON.parse(localStorage.getItem('ou_presupuesto_chapters')) || defaultChapters);
        const [pName, setPName] = useState('Bunker Type 2'); const [cliName, setCliName] = useState('Cliente Ejemplo'); const [budgetNum, setBudgetNum] = useState(`PRE-2026-${Math.floor(Math.random()*100)}`);
        
        useEffect(() => { localStorage.setItem('ou_presupuesto_chapters', JSON.stringify(chapters)); }, [chapters]);
        const pem = useMemo(() => chapters.reduce((s, c) => s + c.items.reduce((sum, i) => sum + (i.isIncluded===false?0:Number(i.cost)), 0), 0), [chapters]);
        
        const generatePDF = () => {
            const element = document.getElementById('pdf-content');
            if(!element) return;
            const opt = { margin: 10, filename: `${budgetNum}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            window.html2pdf().set(opt).from(element).save().then(() => {
                saveItem('facturas', { ref: budgetNum, clientName: cliName, date: new Date().toISOString().split('T')[0], amount: pem, status: 'Emitido' });
                alert("PDF Generado y guardado en Emitidos.");
            });
        };

        return (
            <div className="p-8 max-w-7xl mx-auto h-full flex flex-col overflow-y-auto animate-in fade-in">
                <header className="mb-6 flex justify-between"><h1 className="text-3xl font-black font-display tracking-tightest">Motor P.E.M.</h1><button onClick={generatePDF} className="bg-accent text-white px-6 py-2 rounded-lg font-bold shadow-md flex items-center gap-2"><Download className="w-5 h-5"/> Emitir Presupuesto (PDF)</button></header>
                <div className="grid grid-cols-3 gap-6">
                    <div className="col-span-2 space-y-6">
                        <div className="bg-background rounded-xl border border-secondary shadow-sm">
                            <div className="p-4 bg-secondary/50 border-b border-muted font-bold flex justify-between"><span>Configuración Básica</span></div>
                            <div className="p-4 grid grid-cols-3 gap-4">
                                <div><label className="text-[10px] font-bold uppercase">Referencia</label><input value={budgetNum} onChange={e=>setBudgetNum(e.target.value)} className="w-full p-2 border rounded text-sm font-bold"/></div>
                                <div><label className="text-[10px] font-bold uppercase">Proyecto</label><input value={pName} onChange={e=>setPName(e.target.value)} className="w-full p-2 border rounded text-sm"/></div>
                                <div><label className="text-[10px] font-bold uppercase">Cliente</label><input value={cliName} onChange={e=>setCliName(e.target.value)} className="w-full p-2 border rounded text-sm"/></div>
                            </div>
                        </div>
                        <div className="bg-background rounded-xl border border-secondary shadow-sm">
                            <div className="p-4 bg-secondary/50 border-b border-muted font-bold text-sm flex justify-between"><span>Capítulos y Partidas</span></div>
                            <div className="p-4 space-y-4">
                                {chapters.map(c=>(
                                    <div key={c.id} className="border border-muted rounded-xl p-4">
                                        <h4 className="font-bold text-sm mb-3 border-b pb-2">{c.name}</h4>
                                        {c.items.map(i=>(
                                            <div key={i.id} className="flex justify-between py-1.5 items-center">
                                                <span className="text-sm w-1/2">{i.name}</span>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" value={i.cost} onChange={(e)=>setChapters(chapters.map(ch=>ch.id===c.id?{...ch,items:ch.items.map(it=>it.id===i.id?{...it,cost:Number(e.target.value)}:it)}:ch))} className="w-24 text-right bg-secondary rounded outline-none font-bold p-1"/>
                                                    <button onClick={()=>setChapters(chapters.map(ch=>ch.id===c.id?{...ch,items:ch.items.filter(it=>it.id!==i.id)}:ch))} className="text-destructive"><X className="w-4 h-4"/></button>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={()=>setChapters(chapters.map(ch=>ch.id===c.id?{...ch,items:[...ch.items,{id:Date.now(),name:'Nueva Partida',cost:0}]}:ch))} className="mt-2 text-xs font-bold text-accent">+ Añadir Partida</button>
                                    </div>
                                ))}
                                <button onClick={()=>setChapters([...chapters, {id:`c${Date.now()}`, name:'NUEVO CAPÍTULO', items:[]}])} className="w-full bg-secondary py-2 rounded-lg text-sm font-bold border border-muted border-dashed">+ Añadir Capítulo</button>
                            </div>
                            <div className="bg-primary text-white p-5 flex justify-between rounded-b-xl"><span className="font-bold">Total Presupuesto (P.E.M.)</span><span className="text-xl font-black">{formatCurrency(pem)}</span></div>
                        </div>
                    </div>
                    {/* Previsualizador PDF */}
                    <div className="relative border border-muted bg-gray-100 rounded-xl overflow-hidden h-[600px] flex justify-center p-2 custom-scrollbar overflow-y-auto">
                        <div id="pdf-content" className="bg-white text-black p-8 w-[800px] h-max origin-top scale-[0.4] sm:scale-50 shadow-sm border border-gray-300">
                            <h1 className="text-4xl font-black mb-2 border-b-4 border-black pb-4 uppercase">Presupuesto: {pName}</h1>
                            <div className="flex justify-between mb-8 text-sm"><p><b>Cliente:</b> {cliName}</p><p><b>Ref:</b> {budgetNum}</p></div>
                            {chapters.map(c=>(
                                <div key={c.id} className="mb-6"><h3 className="bg-black text-white px-3 py-1 font-bold text-sm mb-2">{c.name}</h3><table className="w-full text-sm"><tbody>{c.items.map(i=>(<tr key={i.id} className="border-b border-gray-200"><td className="py-2">{i.name}</td><td className="text-right font-bold w-32">{formatCurrency(i.cost)}</td></tr>))}</tbody></table></div>
                            ))}
                            <div className="mt-8 pt-4 border-t-2 border-black text-right font-black text-3xl">TOTAL: {formatCurrency(pem)}</div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // 6. AGENTE WHATSAPP IA
    const AIAgent = ({ saveItem }) => {
        const [chat, setChat] = useState([]); const [waPhone, setWaPhone] = useState("+34 611 222 333"); const [waIncoming, setWaIncoming] = useState("Hola, quiero un búnker. ¿Precios?"); const [isProcessing, setIsProcessing] = useState(false);
        const handleSimulateWA = async (e) => {
            e.preventDefault(); if(!waIncoming.trim()) return;
            const leadMsg = { sender: 'lead', text: waIncoming, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            setChat(prev => [...prev, leadMsg]); setWaIncoming(""); setIsProcessing(true);
            const reply = await fetchAIContent(`Lead dice: "${leadMsg.text}". Responde invitando a agendar en 'calendly.com/ordenurbano'.`);
            setChat(prev => [...prev, { sender: 'bot', text: reply, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]); setIsProcessing(false);
        };
        const saveToCRM = () => {
            if (chat.length === 0) return;
            const newClient = { name: `Lead WA`, apellidos: waPhone, email: '', phone: waPhone, status: 'Lead', prioridad: 'Alta', notas: 'Lead WA Bot.' };
            saveItem('clientes', newClient);
            const newInt = { entityName: newClient.name, type: 'WhatsApp', date: new Date().toISOString().slice(0, 16), subject: 'Chat Bot', notes: chat.map(m => `${m.sender}: ${m.text}`).join('\n\n'), isAlert: true, duracion: 0 };
            saveItem('interacciones', newInt); alert("✅ Guardado en CRM."); setChat([]);
        };
        return (
            <div className="p-8 max-w-5xl mx-auto h-full flex flex-col"><header className="mb-6"><h1 className="text-3xl font-black font-display tracking-tightest">Agente WhatsApp IA</h1></header><div className="bg-[#E5DDD5] border border-secondary rounded-2xl shadow-sm flex flex-col flex-1 overflow-hidden relative"><div className="bg-[#075E54] text-white p-4 flex items-center justify-between z-10"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><User className="w-6 h-6"/></div><div><h3 className="font-bold">{waPhone}</h3></div></div><button onClick={saveToCRM} className="bg-white text-[#075E54] px-4 py-1.5 rounded-full text-xs font-bold shadow flex items-center gap-1 hover:bg-slate-100">Volcar a CRM</button></div><div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[url('https://i.pinimg.com/originals/8f/ba/cb/8fbacbd464e996966eb9d4a6b7a9c21e.jpg')] bg-cover bg-center">{chat.map((msg, i) => (<div key={i} className={`flex ${msg.sender === 'lead' ? 'justify-start' : 'justify-end'}`}><div className={`max-w-[75%] p-3 rounded-xl shadow-sm relative text-sm ${msg.sender === 'lead' ? 'bg-white text-black rounded-tl-none' : 'bg-[#DCF8C6] text-black rounded-tr-none'}`}><p className="pr-8">{msg.text}</p><span className="text-[9px] text-black/40 absolute bottom-1 right-2">{msg.time}</span></div></div>))}{isProcessing && <div className="flex justify-end"><div className="bg-[#DCF8C6] p-3 rounded-xl rounded-tr-none shadow-sm text-sm italic text-black/50">IA escribiendo...</div></div>}</div><form onSubmit={handleSimulateWA} className="bg-[#f0f0f0] p-3 flex gap-2 items-center z-10"><input type="text" value={waIncoming} onChange={e=>setWaIncoming(e.target.value)} placeholder="Mensaje..." className="flex-1 py-3 px-4 rounded-full outline-none text-sm" /><button type="submit" disabled={isProcessing || !waIncoming.trim()} className="bg-[#128C7E] text-white p-3 rounded-full"><Send className="w-5 h-5"/></button></form></div></div>
        );
    };

    // 7. COMPONENTES SECUNDARIOS
    const PresupuestosEmitidos = ({ facturas }) => <div className="p-8 h-full overflow-y-auto animate-in fade-in"><h1 className="text-3xl font-black font-display tracking-tightest mb-8">Pptos Emitidos</h1><div className="space-y-4">{facturas.map(f=>(<div key={f.id} className="bg-background border border-secondary p-5 rounded-xl flex justify-between items-center"><div><p className="font-bold flex items-center gap-2"><FileText className="w-4 h-4 text-accent"/>{f.ref}</p><p className="text-xs text-foreground/50 mt-1">{f.clientName} | {f.date}</p></div><div className="text-right"><p className="font-black text-lg">{formatCurrency(f.amount)}</p><span className="bg-success/10 text-success px-2 py-0.5 rounded text-[10px] font-bold uppercase">{f.status}</span></div></div>))}{facturas.length===0 && <p className="text-foreground/50">No hay facturas emitidas.</p>}</div></div>;
    const AIChat = () => {
        const [msgs, setMsgs] = useState([{role: 'ai', text: 'Hola Ainoa. Soy el asistente de IA. ¿En qué te ayudo?'}]); const [input, setInput] = useState(''); const [isLoading, setIsLoading] = useState(false);
        const handleSend = async (e) => { e.preventDefault(); if(!input.trim()) return; setMsgs(p => [...p, {role: 'user', text: input}]); setInput(''); setIsLoading(true); const reply = await fetchAIContent(input); setMsgs(p => [...p, {role: 'ai', text: reply}]); setIsLoading(false); };
        return (<div className="p-8 h-full flex flex-col"><h1 className="text-3xl font-black font-display tracking-tightest mb-6">Asistente IA</h1><div className="flex-1 bg-background border border-secondary rounded-xl flex flex-col overflow-hidden"><div className="flex-1 p-6 overflow-y-auto space-y-4">{msgs.map((m, i) => (<div key={i} className={`flex gap-3 ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}><div className={`max-w-[80%] p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-primary text-white' : 'bg-secondary'}`}>{m.text}</div></div>))}{isLoading && <div className="p-4 bg-secondary w-max rounded-2xl text-sm">Pensando...</div>}</div><form onSubmit={handleSend} className="p-4 bg-secondary/50 border-t border-secondary flex gap-2"><input type="text" value={input} onChange={e=>setInput(e.target.value)} className="flex-1 p-3 rounded-lg border outline-none" placeholder="Escribe..."/><button type="submit" disabled={isLoading} className="bg-primary text-white p-3 rounded-lg"><Send className="w-5 h-5"/></button></form></div></div>);
    };
    
    const Calidades = () => <div className="p-8 h-full"><h1 className="text-3xl font-black font-display tracking-tightest mb-8">Calidades</h1><div className="bg-background border border-secondary p-6 rounded-2xl"><h3 className="font-bold">Pavimentos Búnker</h3><p className="text-sm mt-2 text-foreground/70">• Hormigón pulido alta resistencia<br/>• Tarima roble macizo</p></div></div>;
    const Contratos = () => <div className="p-8 h-full flex flex-col items-center justify-center text-center"><FileSignature className="w-12 h-12 text-accent mb-4" /><h2 className="text-2xl font-black font-display">Contratos Legales</h2><p className="text-foreground/50 mt-2">Módulo en validación jurídica.</p></div>;
    const Team = () => <div className="p-8 h-full"><h1 className="text-3xl font-black font-display tracking-tightest mb-8">Equipo Interno</h1><div className="bg-background border border-secondary p-6 rounded-2xl w-max text-center"><div className="w-16 h-16 bg-primary text-white rounded-full flex items-center justify-center mx-auto mb-2 font-black">AF</div><h3 className="font-bold">Ainoa Fdez.</h3><p className="text-[10px] text-accent font-bold uppercase">CEO</p></div></div>;
    
    // 8. BÓVEDA GLOBAL (VERSIÓN DEFINITIVA)
    const BovedaGlobal = () => {
        const [versiones, setVersiones] = useState(() => JSON.parse(localStorage.getItem('ou_app_versions')) || []);
        
        const handleFullExport = () => { const data = {}; for(let i=0; i<localStorage.length; i++) { const k=localStorage.key(i); if(k.startsWith('ou_')) { try{data[k]=JSON.parse(localStorage.getItem(k));}catch(e){data[k]=localStorage.getItem(k);} } } const blob=new Blob([JSON.stringify({erp_version:'11.0.0',payload:data})], {type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`OU_Backup.json`; document.body.appendChild(a); a.click(); };
        const handleWipe = () => { if(window.prompt("Escribe BORRAR:") === 'BORRAR') { localStorage.clear(); window.location.reload(); } };
        
        const createSnapshot = () => {
            const snap = { version_id: `v_${Date.now()}`, timestamp: new Date().toISOString(), descripcion: "Snapshot de Seguridad Manual", datos: "Backup guardado" };
            const newVers = [snap, ...versiones]; setVersiones(newVers); localStorage.setItem('ou_app_versions', JSON.stringify(newVers)); alert("Snapshot guardado.");
        };

        return (
            <div className="p-8 max-w-4xl mx-auto h-full flex flex-col overflow-y-auto">
                <h1 className="text-3xl font-black font-display tracking-tightest mb-8">Bóveda Global</h1>
                <div className="grid grid-cols-2 gap-6">
                    <div className="bg-background border border-secondary rounded-2xl p-6"><DownloadCloud className="w-8 h-8 text-accent mb-3" /><h2 className="text-lg font-bold mb-2">Exportar Backup</h2><p className="text-xs text-foreground/60 mb-4">Descarga todo el CRM y proyectos en JSON.</p><button onClick={handleFullExport} className="w-full bg-primary text-primary-foreground py-2 rounded-xl font-bold">Descargar Data</button></div>
                    <div className="bg-background border border-secondary rounded-2xl p-6"><HistoryIcon className="w-8 h-8 text-accent mb-3" /><h2 className="text-lg font-bold mb-2">Snapshots</h2><p className="text-xs text-foreground/60 mb-4">Guardar estado actual del sistema.</p><button onClick={createSnapshot} className="w-full bg-secondary border border-muted text-foreground py-2 rounded-xl font-bold hover:bg-muted">Crear Snapshot</button></div>
                    <div className="col-span-2 bg-background border border-secondary rounded-2xl p-6">
                        <h3 className="font-bold border-b border-muted pb-2 mb-4">Historial de Versiones Automáticas</h3>
                        <div className="space-y-2">{versiones.map(v => (<div key={v.version_id} className="flex justify-between items-center border p-3 rounded-lg"><span className="text-sm font-bold">{new Date(v.timestamp).toLocaleString()}</span><span className="text-xs text-foreground/60">{v.descripcion}</span></div>))}{versiones.length===0 && <p className="text-xs text-foreground/50">No hay snapshots.</p>}</div>
                    </div>
                    <div className="col-span-2 bg-destructive/10 border border-destructive/20 p-6 rounded-2xl flex justify-between items-center"><div className="flex items-center gap-3"><AlertTriangle className="w-6 h-6 text-destructive"/><h3 className="font-bold text-destructive">Wipe Factory</h3></div><button onClick={handleWipe} className="bg-destructive text-white font-bold px-6 py-2 rounded-lg">Borrar Todo</button></div>
                </div>
            </div>
        );
    };

    // --- APP SHELL (MASTER) ---
    const App = () => {
        const [activeTab, setActiveTab] = useState('calculadora_bunker'); 
        
        // Data States (Persistentes)
        const [clientes, setClientes] = useState(() => JSON.parse(localStorage.getItem('ou_clientes')) || initialClientes);
        const [proyectos, setProyectos] = useState(() => JSON.parse(localStorage.getItem('ou_proyectos_lista')) || initialProyectos);
        const [interacciones, setInteracciones] = useState(() => JSON.parse(localStorage.getItem('ou_interacciones')) || initialInteracciones);
        const [facturas, setFacturas] = useState(() => JSON.parse(localStorage.getItem('ou_presupuestos_emitidos')) || initialFacturas);

        useEffect(() => {
            localStorage.setItem('ou_clientes', JSON.stringify(clientes));
            localStorage.setItem('ou_proyectos_lista', JSON.stringify(proyectos));
            localStorage.setItem('ou_interacciones', JSON.stringify(interacciones));
            localStorage.setItem('ou_presupuestos_emitidos', JSON.stringify(facturas));
        }, [clientes, proyectos, interacciones, facturas]);

        // Universal Save & Auto-Version
        const saveItem = (colName, item) => {
            const id = item.id ? String(item.id) : `${colName.substring(0,3)}_${Date.now()}`;
            const newItem = {...item, id};
            if(colName === 'clientes') setClientes(c=>item.id?c.map(x=>x.id===id?newItem:x):[newItem, ...c]);
            if(colName === 'proyectos') setProyectos(c=>item.id?c.map(x=>x.id===id?newItem:x):[newItem, ...c]);
            if(colName === 'interacciones') setInteracciones(c=>item.id?c.map(x=>x.id===id?newItem:x):[newItem, ...c]);
            if(colName === 'facturas') setFacturas(c=>item.id?c.map(x=>x.id===id?newItem:x):[newItem, ...c]);
            
            const v = JSON.parse(localStorage.getItem('ou_app_versions') || '[]');
            v.unshift({ version_id: `v_${Date.now()}`, timestamp: new Date().toISOString(), descripcion: `AutoSave: modificación en ${colName}` });
            localStorage.setItem('ou_app_versions', JSON.stringify(v.slice(0,50)));
        };

        const deleteItem = (colName, id) => {
            if(colName === 'clientes') setClientes(clientes.filter(c=>c.id!==id));
            if(colName === 'proyectos') setProyectos(proyectos.filter(c=>c.id!==id));
            if(colName === 'interacciones') setInteracciones(interacciones.filter(c=>c.id!==id));
        };

        const NavButton = ({id, label, icon:Icn}) => (<button onClick={() => setActiveTab(id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all text-sm font-bold ${activeTab === id ? 'bg-primary text-primary-foreground shadow-md' : 'text-primary-foreground/60 hover:text-white hover:bg-white/5'}`}><Icn className="w-4 h-4 shrink-0" /> <span className="truncate">{label}</span></button>);

        return (
            <div className="flex h-full w-full bg-background text-foreground overflow-hidden font-sans">
                <div className="w-64 bg-sidebar flex flex-col border-r border-sidebar shrink-0 z-50 shadow-2xl">
                    <div className="p-6 pb-2"><h1 className="text-3xl font-black font-display text-primary-foreground leading-none">ORDEN<br/>URBANO</h1></div>
                    <div className="mx-6 mt-6 bg-white/5 border border-white/10 p-3 rounded-xl shadow-inner flex items-center gap-3"><Database className="w-5 h-5 text-accent"/><div><p className="text-[9px] text-primary-foreground/60 font-bold uppercase tracking-widest mb-0.5">Memoria</p><p className="text-xs text-primary-foreground font-black truncate font-display tracking-tightest">Vercel Ready</p></div></div>
                    <nav className="flex-1 px-4 py-4 space-y-1 overflow-y-auto dark-scrollbar mt-2">
                        <p className="px-3 text-[10px] font-bold text-primary-foreground/40 uppercase tracking-widest mb-2 mt-2">Operaciones</p>
                        <NavButton id="dashboard" label="Dashboard" icon={LayoutDashboard} />
                        <NavButton id="clientes" label="Gestor Clientes" icon={Users} />
                        <NavButton id="proyectos" label="Proyectos Kanban" icon={LayoutGrid} />
                        <NavButton id="interacciones" label="Agendador" icon={CalendarCheck} />
                        <p className="px-3 text-[10px] font-bold text-primary-foreground/40 uppercase tracking-widest mb-2 mt-6">Ingeniería e IA</p>
                        <NavButton id="calculadora_bunker" label="Motor P.E.M." icon={Calculator} />
                        <NavButton id="presupuestos" label="Pptos Emitidos" icon={Receipt} />
                        <NavButton id="ai_agent" label="Agente WhatsApp" icon={Smartphone} />
                        <NavButton id="ai_chat" label="Chat IA" icon={MessageSquare} />
                        <NavButton id="boveda" label="Bóveda Global" icon={ShieldAlert} />
                    </nav>
                </div>
                <div className="flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar relative">
                    {activeTab === 'dashboard' && <Dashboard proyectos={proyectos} clientes={clientes} interacciones={interacciones} />}
                    {activeTab === 'clientes' && <GestorClientes clientes={clientes} proyectos={proyectos} interacciones={interacciones} facturas={facturas} saveItem={saveItem} deleteItem={deleteItem} />}
                    {activeTab === 'proyectos' && <GestorProyectos proyectos={proyectos} clientes={clientes} saveItem={saveItem} deleteItem={deleteItem} />}
                    {activeTab === 'interacciones' && <Interacciones interacciones={interacciones} clientes={clientes} saveItem={saveItem} deleteItem={deleteItem} />}
                    {activeTab === 'calculadora_bunker' && <CalculadoraBunker saveItem={saveItem} />}
                    {activeTab === 'presupuestos' && <PresupuestosEmitidos facturas={facturas} />}
                    {activeTab === 'ai_chat' && <AIChat />}
                    {activeTab === 'ai_agent' && <AIAgent saveItem={saveItem} />}
                    {activeTab === 'boveda' && <BovedaGlobal />}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
